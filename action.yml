name: 'Setup snx-rs VPN'
description: 'Install snx-rs, connect to a Check Point VPN tunnel, and disconnect automatically in the post step.'
inputs:
  version:
    description: 'snx-rs release version to install (for example: v5.3.0). Defaults to latest.'
    required: false
    default: latest
  server-name:
    description: 'VPN server to connect to. Optional port can be included, for example vpn.example.com:443.'
    required: true
  login-type:
    description: 'Explicit snx-rs login type, for example vpn_Username_Password.'
    required: true
  user-name:
    description: 'VPN user name.'
    required: true
  password:
    description: 'VPN password secret. The action base64-encodes it when writing the snx-rs config.'
    required: true
  default-route:
    description: 'Route all traffic through the VPN tunnel.'
    required: false
    default: 'false'
  ignore-server-cert:
    description: 'Disable TLS certificate validation. Not recommended.'
    required: false
    default: 'false'
  tunnel-type:
    description: 'Tunnel type to request from snx-rs. Supported values: ipsec, ssl.'
    required: false
  log-level:
    description: 'snx-rs log level.'
    required: false
    default: info
  ca-cert:
    description: 'Optional comma-separated CA certificate paths for server validation.'
    required: false
  connect-timeout-seconds:
    description: 'How long to wait for the command-mode daemon to come up and for the tunnel to connect.'
    required: false
    default: '60'
outputs:
  installed-version:
    description: 'The installed snx-rs version.'
  connected:
    description: 'Whether the VPN connection was confirmed after setup.'
runs:
  using: 'node24'
  main: 'dist/index.js'
  post: 'dist/index.js'
branding:
  icon: 'shield'
  color: 'blue'
