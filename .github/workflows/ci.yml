name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build dist bundle
        run: npm run build

      - name: Verify bundle output exists
        run: |
          set -euo pipefail
          test -f dist/index.js

      - name: Smoke test installer module
        run: node scripts/smoke-install.js

      - name: Verify snx-rs is on PATH
        run: snx-rs --help
