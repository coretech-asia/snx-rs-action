name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      CHECKPOINT_TUNNEL_TYPE: ${{ secrets.CHECKPOINT_TUNNEL_TYPE }}
      CHECKPOINT_CA_CERT: ${{ secrets.CHECKPOINT_CA_CERT }}
      CHECKPOINT_PROBE_URL: ${{ secrets.CHECKPOINT_PROBE_URL }}
      CHECKPOINT_IGNORE_SERVER_CERT: ${{ secrets.CHECKPOINT_IGNORE_SERVER_CERT }}
      SSH_SCAN_HOST: 172.18.9.24

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist bundle
        run: npm run build

      - name: Verify privileged runner prerequisites
        run: |
          set -euo pipefail
          sudo -n true
          test -c /dev/net/tun
          ip link show

      - name: Connect to Check Point VPN
        id: vpn
        uses: ./
        with:
          version: latest
          server-name: ${{ secrets.CHECKPOINT_SERVER }}
          login-type: ${{ secrets.CHECKPOINT_LOGIN_TYPE }}
          user-name: ${{ secrets.CHECKPOINT_USER }}
          password: ${{ secrets.CHECKPOINT_PASSWORD }}
          default-route: false
          ignore-server-cert: ${{ env.CHECKPOINT_IGNORE_SERVER_CERT || 'false' }}
          tunnel-type: ${{ env.CHECKPOINT_TUNNEL_TYPE }}
          ca-cert: ${{ env.CHECKPOINT_CA_CERT }}
          connect-timeout-seconds: 90

      - name: Verify action output
        run: |
          set -euo pipefail
          test "${{ steps.vpn.outputs.connected }}" = "true"
          test -n "${{ steps.vpn.outputs.installed-version }}"

      - name: Scan SSH host key
        run: |
          set -euo pipefail
          mkdir -p .tmp
          ssh-keyscan -T 10 "${SSH_SCAN_HOST}" | tee .tmp/ssh-known-hosts
          test -s .tmp/ssh-known-hosts

      - name: Probe protected resource
        if: ${{ env.CHECKPOINT_PROBE_URL != '' }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "${CHECKPOINT_PROBE_URL}"
